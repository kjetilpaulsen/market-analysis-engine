name: ci_no_docker

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: market_analysis_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d market_analysis_engine_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: market_analysis_engine_test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/market_analysis_engine_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Verify Python and uv
        run: |
          python --version
          uv --version

      - name: Wait for Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Sync dependencies
        run: uv sync --frozen --dev

      - name: Run tests
        run: uv run pytest
